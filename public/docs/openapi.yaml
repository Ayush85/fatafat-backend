, 0);" class="ql-size-large"> if you have any remaining questions concerning the goods. You''ll gain more product knowledge, which will aid in decision-making.</span></p><p class="ql-align-justify"><br></p><h2><strong style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Don''t Get Grounded! A Guide to Flying Drones Legally in Nepal</strong></h2><p><span style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Dreaming of capturing breathtaking aerial views of Nepal with a drone? Hold on! While drones are illegal to operate without permits, getting them is easier than you think. Here''s what you need to know:</span></p><p><strong style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Get Permission to Fly:</strong></p><ol><li data-list="bullet"><span class="ql-ui" contenteditable="false"></span><strong style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Civil Aviation Authority of Nepal (CAAN) is Your Go-To: </strong><span style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Before you take off, apply for and receive permission from CAAN. They set the rules for drone flights.</span></li></ol><p><strong style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Respect the Rules:</strong></p><ol><li data-list="bullet"><span class="ql-ui" contenteditable="false"></span><strong style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Safety First: </strong><span style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Never fly over people or crowds. Respect privacy and avoid flying near people who seem uncomfortable.</span></li><li data-list="bullet"><span class="ql-ui" contenteditable="false"></span><strong style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Good Weather, Good Time: </strong><span style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Fly only during daylight in good weather conditions.</span></li><li data-list="bullet"><span class="ql-ui" contenteditable="false"></span><strong style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">No-Fly Zones: </strong><span style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Steer clear of military installations, power plants, and areas that might raise security concerns.</span></li><li data-list="bullet"><span class="ql-ui" contenteditable="false"></span><strong style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Air Traffic Control: </strong><span style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Maintain a safe distance from airports and areas with active aircraft.</span></li></ol><p><strong style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Obtaining a Permit:</strong><span style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large"> (This process typically takes 3 days)</span></p><ol><li data-list="ordered"><span class="ql-ui" contenteditable="false"></span><strong style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Municipal Permission: </strong><span style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">First, get a permission letter from the local municipality where you plan to fly.</span></li><li data-list="ordered"><span class="ql-ui" contenteditable="false"></span><strong style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">CDO Recommendation: </strong><span style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Next, obtain a recommendation letter from the Chief District Officer''s (CDO) office. They''ll need the municipal permission letter first.</span></li><li data-list="ordered"><span class="ql-ui" contenteditable="false"></span><strong style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Police Security Clearance: </strong><span style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">The police headquarters of your planned flight zone will issue a security clearance letter or provide security if needed.</span></li><li data-list="ordered"><span class="ql-ui" contenteditable="false"></span><strong style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Submit Documents to CAAN: </strong><span style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Finally, submit all the collected documents (permission letter, recommendation letter, and security clearance letter) to CAAN.</span></li></ol><p><strong style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Flying Responsibly:</strong></p><p><span style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Remember, with permission comes responsibility. Fly your drone safely and respectfully, leaving a positive impression on Nepal''s beautiful landscapes and people.</span></p>'
