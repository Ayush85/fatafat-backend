    post:
      summary: 'Create Shipping Address'
      operationId: createShippingAddress
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: idlvxmabtlbanpuhdteuulj
                  nullable: false
                last_name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: wmuyrthrdkohsgufiscxp
                  nullable: false
                contact_number:
                  type: string
                  description: 'Must not be greater than 20 characters.'
                  example: qp
                  nullable: false
                landmark:
                  type: string
                  description: "'email' => 'required|email|max:255', // Removed as per schema. Must not be greater than 255 characters."
                  example: eoimcoqztjzqjwkmj
                  nullable: false
                city:
                  type: string
                  description: 'Was address. Must not be greater than 100 characters.'
                  example: wmgpcrek
                  nullable: false
                district:
                  type: string
                  description: 'Must not be greater than 100 characters.'
                  example: xym
                  nullable: false
                province:
                  type: string
                  description: 'New. Must not be greater than 100 characters.'
                  example: vyaky
                  nullable: false
                country:
                  type: string
                  description: 'Was state. Must not be greater than 100 characters.'
                  example: czejoe
                  nullable: true
                is_default:
                  type: boolean
                  description: ''
                  example: true
                  nullable: false
              required:
                - first_name
                - last_name
                - contact_number
                - landmark
                - city
                - district
                - province
