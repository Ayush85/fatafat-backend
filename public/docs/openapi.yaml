"ql-size-large">Good Weather, Good Time: </strong><span style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Fly only during daylight in good weather conditions.</span></li><li data-list="bullet"><span class="ql-ui" contenteditable="false"></span><strong style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">No-Fly Zones: </strong><span style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Steer clear of military installations, power plants, and areas that might raise security concerns.</span></li><li data-list="bullet"><span class="ql-ui" contenteditable="false"></span><strong style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Air Traffic Control: </strong><span style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Maintain a safe distance from airports and areas with active aircraft.</span></li></ol><p><strong style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Obtaining a Permit:</strong><span style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large"> (This process typically takes 3 days)</span></p><ol><li data-list="ordered"><span class="ql-ui" contenteditable="false"></span><strong style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Municipal Permission: </strong><span style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">First, get a permission letter from the local municipality where you plan to fly.</span></li><li data-list="ordered"><span class="ql-ui" contenteditable="false"></span><strong style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">CDO Recommendation: </strong><span style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Next, obtain a recommendation letter from the Chief District Officer''s (CDO) office. They''ll need the municipal permission letter first.</span></li><li data-list="ordered"><span class="ql-ui" contenteditable="false"></span><strong style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Police Security Clearance: </strong><span style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">The police headquarters of your planned flight zone will issue a security clearance letter or provide security if needed.</span></li><li data-list="ordered"><span class="ql-ui" contenteditable="false"></span><strong style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Submit Documents to CAAN: </strong><span style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Finally, submit all the collected documents (permission letter, recommendation letter, and security clearance letter) to CAAN.</span></li></ol><p><strong style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Flying Responsibly:</strong></p><p><span style="background-color: rgb(255, 255, 255); color: rgb(31, 31, 31);" class="ql-size-large">Remember, with permission comes responsibility. Fly your drone safely and respectfully, leaving a positive impression on Nepal''s beautiful landscapes and people.</span></p>'
