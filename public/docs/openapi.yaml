                  example: hzy
                  nullable: false
                country:
                  type: string
                  description: 'Was state. Must not be greater than 100 characters.'
                  example: ffwkodcfxwobcx
                  nullable: true
                is_default:
                  type: boolean
                  description: ''
                  example: true
