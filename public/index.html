<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fatafat API Documentation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 60px 40px;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        .logo {
            font-size: 3em;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            border: none;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        .features {
            margin-top: 40px;
            text-align: left;
            background: #f5f5f5;
            padding: 20px;
            border-radius: 5px;
        }
        .features h3 {
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }
        .features ul {
            list-style: none;
        }
        .features li {
            color: #666;
            margin: 8px 0;
            padding-left: 25px;
            position: relative;
        }
        .features li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #667eea;
            font-weight: bold;
        }
        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 0.9em;
        }
    </style>
    <script>
        // Auto-redirect to documentation after 3 seconds
        window.addEventListener('load', function() {
            setTimeout(function() {
                window.location.href = '/documentation';
            }, 3000);
        });
    </script>
</head>
<body>
    <div class="container">
        <div class="logo">📚</div>
        <h1>Fatafat API</h1>
        <p>Welcome to the Fatafat E-Commerce API Documentation</p>
        
        <button class="btn" onclick="window.location.href = '/documentation'">
            View Documentation →
        </button>

        <div class="features">
            <h3>What You Can Do</h3>
            <ul>
                <li>Browse all API endpoints</li>
                <li>Test endpoints interactively</li>
                <li>View request/response examples</li>
                <li>Manage authentication</li>
                <li>Filter by category or search</li>
            </ul>
        </div>

        <div class="footer">
            <p>Redirecting to documentation...</p>
        </div>
    </div>
</body>
</html>
